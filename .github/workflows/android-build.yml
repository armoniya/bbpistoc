name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'bbpi-trading/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      - name: Ensure debug keystore exists
        working-directory: bbpi-trading
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair -v -keystore debug.keystore -storepass android \
              -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build debug APK
        working-directory: bbpi-trading
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbpi-trading-debug-apk
          path: bbpi-trading/app/build/outputs/apk/debug/*.apk

      - name: Verify APK signing
        working-directory: bbpi-trading
        run: |
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner -type f | sort -V | tail -n1)
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          {
            echo "apksigner binary: $APKSIGNER"
            echo "apk path: $APK_PATH"
            echo "--- apksigner verify --verbose --print-certs ---"
            "$APKSIGNER" verify --verbose --print-certs "$APK_PATH" 2>&1 || echo "APKSIGNER_EXIT_NONZERO"
          } | tee apksigner-verify.txt

      - name: Publish debug APK to GitHub Release
        working-directory: bbpi-trading
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          cp "$APK_PATH" bbpi-trading-debug.apk
          gh release delete debug-latest --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create debug-latest bbpi-trading-debug.apk apksigner-verify.txt \
            --repo "$GITHUB_REPOSITORY" \
            --title "BBPI Trading - Debug APK (latest)" \
            --notes "Otomatik build - commit ${{ github.sha }}" \
            --prerelease
